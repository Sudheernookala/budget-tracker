<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1b3a6b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Budget">
<link rel="manifest" href="./manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<title>Budget Tracker</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #1b3a6b;
  --blue2: #2563b0;
  --accent: #3b82f6;
  --gray: #64748b;
  --light: #e8edf5;
  --bg: #f1f4f9;
  --white: #ffffff;
  --danger: #dc2626;
  --warn: #d97706;
  --success: #16a34a;
  --radius: 16px;
  --shadow: 0 2px 16px rgba(27,58,107,0.09);
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: #1a2340;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, #1b3a6b 0%, #2563b0 100%);
  color: #fff;
  padding: 16px 16px 12px;
  position: fixed;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  z-index: 100;
  box-shadow: 0 2px 16px rgba(27,58,107,0.2);
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.header-top h1 { font-size: 1.1rem; font-weight: 700; }
.past-pill {
  background: var(--warn);
  color: #fff;
  font-size: 0.65rem;
  font-weight: 700;
  border-radius: 20px;
  padding: 3px 9px;
  letter-spacing: 0.5px;
}
.month-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,0.13);
  border-radius: 10px;
  padding: 6px 10px;
}
.month-nav button {
  background: rgba(255,255,255,0.2);
  border: none;
  color: #fff;
  border-radius: 7px;
  width: 28px; height: 28px;
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
  flex-shrink: 0;
}
.month-nav button:hover { background: rgba(255,255,255,0.35); }
.month-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
.month-nav span {
  font-size: 0.92rem;
  font-weight: 600;
  text-align: center;
  flex: 1;
}

/* ── TAB BAR ── */
.tab-bar {
  display: flex;
  background: var(--white);
  border-top: 1px solid var(--light);
  position: fixed;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  z-index: 100;
  box-shadow: 0 -2px 12px rgba(27,58,107,0.08);
}
.tab-btn {
  flex: 1;
  padding: 10px 4px 8px;
  border: none;
  background: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--gray);
  border-top: 3px solid transparent;
  transition: color 0.15s, border-color 0.15s;
}
.tab-btn .ti { font-size: 1.25rem; line-height: 1; }
.tab-btn.active { color: var(--blue); border-top-color: var(--accent); }

/* ── PAGES ── */
.pages { padding-top: 110px; padding-bottom: 72px; }
.page { display: none; padding: 14px 14px 0; flex-direction: column; gap: 14px; }
.page.active { display: flex; }

/* ── CARD ── */
.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-header {
  padding: 14px 16px 0;
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--blue);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  display: flex;
  align-items: center;
  gap: 6px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--light);
}
.card-body { padding: 14px 16px; }

/* ── BUDGET HERO ── */
.budget-hero {
  background: linear-gradient(135deg, #1b3a6b, #2563b0);
  border-radius: var(--radius);
  padding: 18px 16px;
  color: #fff;
}
.budget-hero-label {
  font-size: 0.75rem;
  font-weight: 600;
  opacity: 0.75;
  margin-bottom: 8px;
}
.budget-hero-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.budget-hero-sym { font-size: 1.5rem; font-weight: 700; opacity: 0.6; }
.budget-hero-input {
  flex: 1;
  background: rgba(255,255,255,0.15);
  border: 1.5px solid rgba(255,255,255,0.3);
  border-radius: 10px;
  color: #fff;
  font-size: 1.6rem;
  font-weight: 800;
  padding: 6px 12px;
  outline: none;
  width: 100%;
}
.budget-hero-input::placeholder { color: rgba(255,255,255,0.35); }
.budget-hero-input:focus { border-color: rgba(255,255,255,0.7); }
.budget-hero-input:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── FORM ELEMENTS ── */
.form-row { margin-bottom: 11px; }
.form-row:last-child { margin-bottom: 0; }
.form-label {
  display: block;
  font-size: 0.73rem;
  font-weight: 600;
  color: var(--gray);
  margin-bottom: 5px;
}
.form-input {
  width: 100%;
  padding: 10px 12px;
  border: 1.5px solid var(--light);
  border-radius: 9px;
  font-size: 0.88rem;
  color: #1a2340;
  background: #f8fafd;
  outline: none;
  transition: border 0.15s, box-shadow 0.15s;
  appearance: none;
}
.form-input:focus {
  border-color: var(--accent);
  background: #fff;
  box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
}
.form-input:disabled { opacity: 0.4; cursor: not-allowed; background: #f0f2f7; }

/* ── BUTTONS ── */
.btn {
  display: block;
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 11px;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  text-align: center;
  transition: opacity 0.15s, transform 0.1s;
}
.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-primary { background: linear-gradient(135deg, #1b3a6b, #2563b0); color: #fff; }
.btn-green { background: linear-gradient(135deg, #16a34a, #22c55e); color: #fff; }
.btn-outline { background: #fff; color: var(--blue); border: 1.5px solid var(--light); }
.btn-row { display: flex; gap: 10px; }
.btn-row .btn { flex: 1; }
.btn-icon-sm {
  padding: 5px 10px;
  border: none;
  border-radius: 7px;
  font-size: 0.72rem;
  font-weight: 700;
  cursor: pointer;
  background: #fef2f2;
  color: var(--danger);
  white-space: nowrap;
  transition: background 0.15s;
}
.btn-icon-sm:hover { background: #fee2e2; }

/* ── READONLY BANNER ── */
.readonly-banner {
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.78rem;
  font-weight: 600;
  color: var(--warn);
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── CAT LIMIT ROWS ── */
.cat-limit-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid #f3f5fb;
}
.cat-limit-row:last-child { border-bottom: none; }
.cat-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.cat-limit-name { flex: 1; font-size: 0.83rem; font-weight: 600; }
.cat-limit-input {
  width: 85px;
  padding: 7px 10px;
  border: 1.5px solid var(--light);
  border-radius: 8px;
  font-size: 0.83rem;
  text-align: right;
  background: #f8fafd;
  outline: none;
  transition: border 0.15s;
}
.cat-limit-input:focus { border-color: var(--accent); background: #fff; }
.cat-limit-input:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── SUMMARY HERO ── */
.summary-hero {
  background: linear-gradient(135deg, #1b3a6b, #2563b0);
  border-radius: var(--radius);
  padding: 18px 16px;
  color: #fff;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.summary-top { display: flex; justify-content: space-between; align-items: flex-start; }
.sh-label { font-size: 0.72rem; opacity: 0.7; margin-bottom: 3px; }
.sh-value { font-size: 1.7rem; font-weight: 800; }
.sh-sub { font-size: 0.95rem; font-weight: 600; opacity: 0.7; }
.sh-remaining { font-size: 0.8rem; opacity: 0.75; }
.prog-track { background: rgba(255,255,255,0.2); border-radius: 20px; height: 9px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 20px; transition: width 0.5s, background 0.3s; }
.prog-label { font-size: 0.75rem; opacity: 0.75; text-align: right; margin-top: 4px; }

/* ── ALERT ── */
.alert {
  border-radius: 11px;
  padding: 11px 14px;
  font-size: 0.8rem;
  font-weight: 600;
  display: none;
  align-items: center;
  gap: 8px;
}
.alert.show { display: flex; }
.alert-ok    { background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; }
.alert-warn  { background: #fffbeb; color: var(--warn);    border: 1px solid #fde68a; }
.alert-danger{ background: #fef2f2; color: var(--danger);  border: 1px solid #fecaca; }

/* ── PIE CHART ── */
.chart-area { display: flex; align-items: center; gap: 16px; }
.legend { display: flex; flex-direction: column; gap: 7px; flex: 1; }
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 0.77rem; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.legend-pct { margin-left: auto; font-weight: 700; color: var(--gray); }

/* ── CAT BARS ── */
.cat-bar { margin-bottom: 12px; }
.cat-bar:last-child { margin-bottom: 0; }
.cat-bar-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 5px;
}
.cat-bar-name {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.81rem;
  font-weight: 600;
}
.cat-bar-amt { font-size: 0.75rem; color: var(--gray); }
.bar-track { background: var(--light); border-radius: 20px; height: 7px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 20px; transition: width 0.4s; }
.over-pill {
  font-size: 0.62rem;
  background: #fef2f2;
  color: var(--danger);
  border-radius: 20px;
  padding: 1px 6px;
  font-weight: 700;
}

/* ── EXPENSE ITEMS ── */
.expense-item {
  display: flex;
  align-items: center;
  gap: 11px;
  padding: 11px 0;
  border-bottom: 1px solid #f3f5fb;
}
.expense-item:last-child { border-bottom: none; }
.exp-ico {
  width: 38px; height: 38px;
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}
.exp-info { flex: 1; min-width: 0; }
.exp-cat  { font-size: 0.83rem; font-weight: 700; }
.exp-note { font-size: 0.73rem; color: var(--gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.exp-date { font-size: 0.68rem; color: #94a3b8; margin-top: 1px; }
.exp-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.exp-amt  { font-size: 0.9rem; font-weight: 800; color: var(--blue); }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 28px 0; color: #94a3b8; }
.empty-icon { font-size: 2.2rem; margin-bottom: 7px; }
.empty-text { font-size: 0.83rem; }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 82px;
  left: 50%;
  transform: translateX(-50%);
  padding: 9px 20px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 700;
  z-index: 999;
  opacity: 0;
  transition: opacity 0.3s;
  white-space: nowrap;
  pointer-events: none;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-top">
    <h1>📊 Budget Tracker</h1>
    <span class="past-pill" id="pastPill" style="display:none">PAST</span>
  </div>
  <div class="month-nav">
    <button id="prevBtn" onclick="changeMonth(-1)">&#8592;</button>
    <span id="monthLabel"></span>
    <button id="nextBtn" onclick="changeMonth(1)">&#8594;</button>
  </div>
</div>

<!-- PAGES -->
<div class="pages">

  <!-- PAGE: BUDGET -->
  <div class="page active" id="page-budget">

    <div id="readonlyBanner" class="readonly-banner" style="display:none">
      ⚠️ Viewing past month — read only
    </div>

    <div class="budget-hero">
      <div class="budget-hero-label">Total Monthly Budget</div>
      <div class="budget-hero-row">
        <span class="budget-hero-sym">€</span>
        <input class="budget-hero-input" type="number" id="totalBudget" placeholder="0" min="0">
      </div>
    </div>

    <div class="card">
      <div class="card-header">🎯 Category Limits</div>
      <div class="card-body" id="catLimitRows"></div>
    </div>

    <button class="btn btn-primary" id="saveBudgetBtn" onclick="saveBudgets()">💾 Save Budgets</button>

  </div>

  <!-- PAGE: SUMMARY -->
  <div class="page" id="page-summary">

    <div class="summary-hero">
      <div class="summary-top">
        <div>
          <div class="sh-label">Total Spent</div>
          <div class="sh-value" id="shSpent">€0.00</div>
        </div>
        <div style="text-align:right">
          <div class="sh-label">Budget</div>
          <div class="sh-sub" id="shBudget">€0.00</div>
          <div class="sh-remaining" id="shRemaining"></div>
        </div>
      </div>
      <div>
        <div class="prog-track">
          <div class="prog-fill" id="progFill" style="width:0%;background:#22c55e"></div>
        </div>
        <div class="prog-label" id="progLabel">0% used</div>
      </div>
    </div>

    <div class="alert" id="alertBox">
      <span id="alertIcon"></span><span id="alertMsg"></span>
    </div>

    <div class="card">
      <div class="card-header">🥧 Spending Breakdown</div>
      <div class="card-body">
        <div class="chart-area">
          <canvas id="pieChart" width="150" height="150"></canvas>
          <div class="legend" id="legend"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">📂 By Category</div>
      <div class="card-body" id="catBars"></div>
    </div>

  </div>

  <!-- PAGE: LOG -->
  <div class="page" id="page-log">

    <div class="card">
      <div class="card-header">➕ Add Expense</div>
      <div class="card-body">
        <div class="form-row">
          <label class="form-label">Date</label>
          <input class="form-input" type="date" id="expDate">
        </div>
        <div class="form-row">
          <label class="form-label">Category</label>
          <select class="form-input" id="expCat"></select>
        </div>
        <div class="form-row">
          <label class="form-label">Amount (€)</label>
          <input class="form-input" type="number" id="expAmount" placeholder="0.00" min="0" step="0.01">
        </div>
        <div class="form-row">
          <label class="form-label">Note (optional)</label>
          <input class="form-input" type="text" id="expNote" placeholder="e.g. Grocery run">
        </div>
        <button class="btn btn-green" id="addExpBtn" onclick="addExpense()" style="margin-top:4px">+ Add Expense</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">🧾 Expense Log</div>
      <div class="card-body" id="expenseList"></div>
    </div>

    <div class="card">
      <div class="card-header">📤 Export</div>
      <div class="card-body">
        <div class="btn-row">
          <button class="btn btn-primary" onclick="exportPDF()">⬇ PDF</button>
          <button class="btn btn-outline" onclick="copyText()">📋 Copy</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- TAB BAR -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-budget" onclick="switchTab('budget')">
    <span class="ti">⚙️</span>Budget
  </button>
  <button class="tab-btn" id="tab-summary" onclick="switchTab('summary')">
    <span class="ti">📈</span>Summary
  </button>
  <button class="tab-btn" id="tab-log" onclick="switchTab('log')">
    <span class="ti">🧾</span>Log
  </button>
</div>

<div id="toast"></div>

<script>
// ── CATEGORIES ──────────────────────────────────────────────────────────────
const CATS = [
  { name:'Housing',       color:'#1b3a6b', icon:'🏠' },
  { name:'Food',          color:'#2980b9', icon:'🍔' },
  { name:'Transport',     color:'#16a085', icon:'🚗' },
  { name:'Health',        color:'#8e44ad', icon:'💊' },
  { name:'Entertainment', color:'#e67e22', icon:'🎬' },
  { name:'Clothing',      color:'#c0392b', icon:'👗' },
  { name:'Savings',       color:'#27ae60', icon:'💰' },
  { name:'Other',         color:'#7f8c8d', icon:'📦' },
];

// ── STATE ────────────────────────────────────────────────────────────────────
const today = new Date();
let vYear = today.getFullYear(), vMonth = today.getMonth();

function vKey() { return `${vYear}-${String(vMonth+1).padStart(2,'0')}`; }
function isCurrentMonth() { return vYear === today.getFullYear() && vMonth === today.getMonth(); }

function loadState() {
  try { return JSON.parse(localStorage.getItem('bgt3') || '{}'); } catch { return {}; }
}
function getMonthData(ym) {
  const s = loadState();
  if (!s[ym]) s[ym] = { totalBudget: 0, catBudgets: {}, expenses: [] };
  CATS.forEach(c => { if (s[ym].catBudgets[c.name] === undefined) s[ym].catBudgets[c.name] = 0; });
  return s[ym];
}
function saveMonthData(ym, data) {
  const s = loadState();
  s[ym] = data;
  try { localStorage.setItem('bgt3', JSON.stringify(s)); } catch(e) { console.warn('Storage error', e); }
}

// ── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
  render();
}

// ── MONTH NAV ────────────────────────────────────────────────────────────────
function changeMonth(dir) {
  vMonth += dir;
  if (vMonth > 11) { vMonth = 0; vYear++; }
  if (vMonth < 0)  { vMonth = 11; vYear--; }
  init(false);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
function init(setDate = true) {
  const d = new Date(vYear, vMonth, 1);
  document.getElementById('monthLabel').textContent =
    d.toLocaleString('default', { month: 'long', year: 'numeric' });
  document.getElementById('nextBtn').disabled = isCurrentMonth();
  document.getElementById('pastPill').style.display = isCurrentMonth() ? 'none' : 'inline-block';

  const past = !isCurrentMonth();
  document.getElementById('readonlyBanner').style.display = past ? 'flex' : 'none';

  // Disable inputs if past month
  ['totalBudget','expDate','expCat','expAmount','expNote'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.disabled = past;
  });
  document.getElementById('saveBudgetBtn').disabled = past;
  document.getElementById('addExpBtn').disabled = past;

  // Load month data into budget form
  const data = getMonthData(vKey());
  document.getElementById('totalBudget').value = data.totalBudget || '';

  // Build category limit rows
  const rows = document.getElementById('catLimitRows');
  rows.innerHTML = '';
  CATS.forEach(c => {
    const row = document.createElement('div');
    row.className = 'cat-limit-row';
    row.innerHTML = `
      <div class="cat-dot" style="background:${c.color}"></div>
      <div class="cat-limit-name">${c.icon} ${c.name}</div>
      <input type="number" min="0" step="0.01"
        class="cat-limit-input" id="cl_${c.name}"
        value="${data.catBudgets[c.name] || ''}"
        placeholder="€0"
        ${past ? 'disabled' : ''}>`;
    rows.appendChild(row);
  });

  // Build category select
  document.getElementById('expCat').innerHTML =
    CATS.map(c => `<option value="${c.name}">${c.icon} ${c.name}</option>`).join('');

  if (setDate) {
    document.getElementById('expDate').value = today.toISOString().split('T')[0];
  }

  render();
}

// ── ACTIONS ──────────────────────────────────────────────────────────────────
function saveBudgets() {
  if (!isCurrentMonth()) return;
  const ym = vKey(), data = getMonthData(ym);
  data.totalBudget = parseFloat(document.getElementById('totalBudget').value) || 0;
  CATS.forEach(c => {
    const el = document.getElementById('cl_' + c.name);
    data.catBudgets[c.name] = el ? (parseFloat(el.value) || 0) : 0;
  });
  saveMonthData(ym, data);
  render();
  toast('Budgets saved ✓');
}

function addExpense() {
  if (!isCurrentMonth()) return;
  const date   = document.getElementById('expDate').value;
  const cat    = document.getElementById('expCat').value;
  const amount = parseFloat(document.getElementById('expAmount').value);
  const note   = document.getElementById('expNote').value.trim();
  if (!date || !cat || isNaN(amount) || amount <= 0) {
    toast('Fill in date, category & amount', 'err'); return;
  }
  const ym = vKey(), data = getMonthData(ym);
  data.expenses.unshift({ id: Date.now(), date, cat, amount, note });
  saveMonthData(ym, data);
  document.getElementById('expAmount').value = '';
  document.getElementById('expNote').value = '';
  render();
  toast('Expense added ✓');
}

function deleteExpense(id) {
  if (!isCurrentMonth()) return;
  const ym = vKey(), data = getMonthData(ym);
  data.expenses = data.expenses.filter(e => e.id !== id);
  saveMonthData(ym, data);
  render();
  toast('Deleted');
}

// ── TOTALS ───────────────────────────────────────────────────────────────────
function getTotals() {
  const data = getMonthData(vKey());
  const byCat = {};
  CATS.forEach(c => byCat[c.name] = 0);
  data.expenses.forEach(e => { byCat[e.cat] = (byCat[e.cat] || 0) + e.amount; });
  const total = Object.values(byCat).reduce((a, b) => a + b, 0);
  return { total, byCat, expenses: data.expenses, budget: data.totalBudget, catBudgets: data.catBudgets };
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const t = getTotals();
  renderSummaryHero(t);
  renderAlert(t);
  renderPie(t);
  renderCatBars(t);
  renderLog(t);
}

function renderSummaryHero({ total, budget }) {
  document.getElementById('shSpent').textContent = `€${total.toFixed(2)}`;
  document.getElementById('shBudget').textContent = `€${budget.toFixed(2)}`;
  const rem = budget - total;
  document.getElementById('shRemaining').textContent =
    budget > 0 ? (rem >= 0 ? `€${rem.toFixed(2)} left` : `€${Math.abs(rem).toFixed(2)} over`) : '';
  const pct = budget > 0 ? Math.min(total / budget, 1) : 0;
  document.getElementById('progFill').style.width = (pct * 100) + '%';
  document.getElementById('progFill').style.background =
    total > budget ? '#ef4444' : total >= budget * 0.85 ? '#f59e0b' : '#22c55e';
  document.getElementById('progLabel').textContent =
    budget > 0 ? `${Math.round(pct * 100)}% used` : 'No budget set';
}

function renderAlert({ total, budget }) {
  const box = document.getElementById('alertBox');
  if (budget > 0 && total > budget) {
    box.className = 'alert show alert-danger';
    document.getElementById('alertIcon').textContent = '⚠️';
    document.getElementById('alertMsg').textContent = `Over budget by €${(total - budget).toFixed(2)}!`;
  } else if (budget > 0 && total >= budget * 0.85) {
    box.className = 'alert show alert-warn';
    document.getElementById('alertIcon').textContent = '⚡';
    document.getElementById('alertMsg').textContent = `${Math.round((total / budget) * 100)}% of budget used — watch out!`;
  } else if (total > 0 && budget > 0) {
    box.className = 'alert show alert-ok';
    document.getElementById('alertIcon').textContent = '✅';
    document.getElementById('alertMsg').textContent = `On track! €${(budget - total).toFixed(2)} remaining.`;
  } else {
    box.className = 'alert';
  }
}

function renderPie({ byCat, total }) {
  const canvas = document.getElementById('pieChart');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const legend = document.getElementById('legend');

  if (total === 0) {
    ctx.fillStyle = '#e8edf5';
    ctx.beginPath(); ctx.arc(W/2, H/2, H/2 - 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#94a3b8'; ctx.font = '11px Segoe UI';
    ctx.textAlign = 'center'; ctx.fillText('No data', W/2, H/2 + 4);
    legend.innerHTML = ''; return;
  }

  let start = -Math.PI / 2;
  const cx = W/2, cy = H/2, r = H/2 - 6;
  const items = CATS.filter(c => byCat[c.name] > 0);
  items.forEach(c => {
    const slice = (byCat[c.name] / total) * Math.PI * 2;
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, start + slice); ctx.closePath();
    ctx.fillStyle = c.color; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    start += slice;
  });
  // Donut hole
  ctx.beginPath(); ctx.arc(cx, cy, r * 0.52, 0, Math.PI*2);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.fillStyle = '#1a2340'; ctx.font = 'bold 11px Segoe UI';
  ctx.textAlign = 'center'; ctx.fillText(`€${total.toFixed(0)}`, cx, cy - 3);
  ctx.fillStyle = '#94a3b8'; ctx.font = '9px Segoe UI'; ctx.fillText('total', cx, cy + 10);

  legend.innerHTML = items.map(c => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${c.color}"></div>
      <span>${c.name}</span>
      <span class="legend-pct">${Math.round((byCat[c.name]/total)*100)}%</span>
    </div>`).join('');
}

function renderCatBars({ byCat, catBudgets }) {
  const el = document.getElementById('catBars');
  const items = CATS.filter(c => byCat[c.name] > 0 || catBudgets[c.name] > 0);
  if (!items.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📂</div><div class="empty-text">No data this month</div></div>';
    return;
  }
  el.innerHTML = items.map(c => {
    const spent = byCat[c.name] || 0, limit = catBudgets[c.name] || 0;
    const pct = limit > 0 ? Math.min(spent / limit, 1) : 0;
    const color = limit > 0 && spent > limit ? '#ef4444'
                : limit > 0 && spent >= limit * 0.85 ? '#f59e0b' : c.color;
    const over = limit > 0 && spent > limit ? '<span class="over-pill">OVER</span>' : '';
    return `<div class="cat-bar">
      <div class="cat-bar-top">
        <div class="cat-bar-name">
          <div class="cat-dot" style="background:${c.color}"></div>
          ${c.icon} ${c.name} ${over}
        </div>
        <div class="cat-bar-amt">€${spent.toFixed(2)}${limit > 0 ? ` / €${limit.toFixed(2)}` : ''}</div>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:${limit > 0 ? pct * 100 : 0}%;background:${color}"></div>
      </div>
    </div>`;
  }).join('');
}

function renderLog({ expenses }) {
  const el = document.getElementById('expenseList');
  const past = !isCurrentMonth();
  if (!expenses.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">🧾</div><div class="empty-text">No expenses this month</div></div>';
    return;
  }
  el.innerHTML = expenses.map(e => {
    const cat = CATS.find(c => c.name === e.cat) || { color: '#94a3b8', icon: '📦' };
    const delBtn = past ? '' :
      `<button class="btn-icon-sm" onclick="deleteExpense(${e.id})">✕ Del</button>`;
    return `<div class="expense-item">
      <div class="exp-ico" style="background:${cat.color}22;color:${cat.color}">${cat.icon}</div>
      <div class="exp-info">
        <div class="exp-cat">${e.cat}</div>
        <div class="exp-note">${e.note || '—'}</div>
        <div class="exp-date">${e.date}</div>
      </div>
      <div class="exp-right">
        <div class="exp-amt">€${e.amount.toFixed(2)}</div>
        ${delBtn}
      </div>
    </div>`;
  }).join('');
}

// ── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type === 'err' ? '#dc2626' : '#16a34a';
  el.style.color = '#fff';
  el.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.opacity = '0'; }, 2200);
}

// ── COPY TEXT ────────────────────────────────────────────────────────────────
function copyText() {
  const { total, byCat, expenses, budget } = getTotals();
  const d = new Date(vYear, vMonth, 1);
  let txt = `Budget Tracker — ${d.toLocaleString('default', { month:'long', year:'numeric' })}\n`;
  txt += `${'─'.repeat(38)}\nSpent: €${total.toFixed(2)} / Budget: €${budget.toFixed(2)}\n${'─'.repeat(38)}\n`;
  CATS.filter(c => byCat[c.name] > 0).forEach(c => { txt += `${c.name}: €${byCat[c.name].toFixed(2)}\n`; });
  txt += `${'─'.repeat(38)}\n`;
  expenses.forEach(e => { txt += `${e.date} | ${e.cat} | €${e.amount.toFixed(2)}${e.note ? ' | ' + e.note : ''}\n`; });
  navigator.clipboard.writeText(txt)
    .then(() => toast('Copied ✓'))
    .catch(() => toast('Copy failed', 'err'));
}

// ── PDF ──────────────────────────────────────────────────────────────────────
function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const { total, byCat, expenses, budget, catBudgets } = getTotals();
  const d = new Date(vYear, vMonth, 1);
  const monthName = d.toLocaleString('default', { month:'long', year:'numeric' });
  const blue=[27,58,107], gray=[74,90,122], light=[228,234,244], black=[26,35,64];

  doc.setFillColor(...blue); doc.rect(0,0,210,22,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(14); doc.setFont('helvetica','bold');
  doc.text('Monthly Budget Tracker',14,10);
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text(monthName,14,17);
  doc.text(`Generated: ${new Date().toLocaleDateString()}`,196,17,{align:'right'});

  let y=30;
  doc.setTextColor(...black); doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text('Summary',14,y); y+=6;
  doc.setFillColor(...light); doc.roundedRect(14,y,182,18,3,3,'F');
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(...gray);
  doc.text('Total Spent',20,y+6); doc.text('Budget',80,y+6); doc.text('Remaining',140,y+6);
  doc.setFontSize(11); doc.setFont('helvetica','bold'); doc.setTextColor(...black);
  doc.text(`€${total.toFixed(2)}`,20,y+13); doc.text(`€${budget.toFixed(2)}`,80,y+13);
  const rem=budget-total;
  doc.setTextColor(rem<0?192:27,rem<0?57:58,rem<0?43:107);
  doc.text(`€${rem.toFixed(2)}`,140,y+13); y+=26;

  doc.setFillColor(...light); doc.roundedRect(14,y,182,5,2,2,'F');
  const pct=budget>0?Math.min(total/budget,1):0;
  doc.setFillColor(...(total>budget?[192,57,43]:total>=budget*0.85?[230,126,34]:[27,122,58]));
  doc.roundedRect(14,y,182*pct,5,2,2,'F'); y+=14;

  doc.setTextColor(...black); doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text('Category Breakdown',14,y); y+=6;
  CATS.filter(c=>byCat[c.name]>0||catBudgets[c.name]>0).forEach(c=>{
    const spent=byCat[c.name]||0, limit=catBudgets[c.name]||0;
    const r=parseInt(c.color.slice(1,3),16),g=parseInt(c.color.slice(3,5),16),b=parseInt(c.color.slice(5,7),16);
    doc.setFillColor(r,g,b); doc.circle(17,y+2,2,'F');
    doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...black);
    doc.text(c.name,22,y+3.5);
    doc.setFont('helvetica','normal'); doc.setTextColor(...gray);
    doc.text(`€${spent.toFixed(2)}${limit>0?' / €'+limit.toFixed(2):''}`,100,y+3.5);
    if(limit>0&&spent>limit){doc.setTextColor(192,57,43);doc.setFont('helvetica','bold');doc.text('OVER',165,y+3.5);}
    doc.setFillColor(...light); doc.roundedRect(22,y+5,80,2.5,1,1,'F');
    if(limit>0){
      const p=Math.min(spent/limit,1);
      doc.setFillColor(...(spent>limit?[192,57,43]:spent>=limit*0.85?[230,126,34]:[r,g,b]));
      doc.roundedRect(22,y+5,80*p,2.5,1,1,'F');
    }
    y+=12; if(y>260){doc.addPage();y=20;}
  });

  y+=4;
  doc.setTextColor(...black); doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text('Expense Log',14,y); y+=6;
  doc.setFillColor(...blue); doc.rect(14,y,182,7,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont('helvetica','bold');
  doc.text('Date',17,y+5); doc.text('Category',50,y+5); doc.text('Note',95,y+5);
  doc.text('Amount',175,y+5,{align:'right'}); y+=10;
  if(!expenses.length){
    doc.setTextColor(...gray); doc.setFont('helvetica','italic'); doc.setFontSize(9);
    doc.text('No expenses logged.',14,y);
  } else {
    expenses.forEach((e,i)=>{
      if(y>270){doc.addPage();y=20;}
      if(i%2===0){doc.setFillColor(247,249,252);doc.rect(14,y-4,182,7,'F');}
      doc.setTextColor(...black); doc.setFont('helvetica','normal'); doc.setFontSize(8);
      doc.text(e.date,17,y); doc.text(e.cat,50,y);
      doc.text(e.note?e.note.substring(0,35):'—',95,y);
      doc.setFont('helvetica','bold');
      doc.text(`€${e.amount.toFixed(2)}`,175,y,{align:'right'}); y+=7;
    });
    doc.setFillColor(...light); doc.rect(14,y-2,182,8,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...blue);
    doc.text('Total',17,y+4); doc.text(`€${total.toFixed(2)}`,175,y+4,{align:'right'});
  }
  doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(...gray);
  doc.text('Generated by Monthly Budget Tracker',105,290,{align:'center'});
  doc.save(`budget-${vKey()}.pdf`);
}

      .catch(() => {});
  });
}

</script>
