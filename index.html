<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1b3a6b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget">
  <link rel="manifest" href="./manifest.json">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<title>Budget Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #1a2340; min-height: 100vh; }

  header { background: #1b3a6b; color: #fff; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.15); flex-wrap: wrap; gap: 10px; }
  header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.5px; }

  .month-nav { display: flex; align-items: center; gap: 10px; }
  .month-nav button { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; border-radius: 6px; padding: 5px 12px; cursor: pointer; font-size: 1rem; transition: background 0.2s; }
  .month-nav button:hover { background: rgba(255,255,255,0.28); }
  .month-nav span { font-size: 1rem; font-weight: 600; min-width: 150px; text-align: center; }
  .past-badge { background: #e67e22; color: #fff; font-size: 0.7rem; font-weight: 700; border-radius: 4px; padding: 2px 7px; margin-left: 6px; vertical-align: middle; }

  .main { max-width: 1100px; margin: 28px auto; padding: 0 16px; display: grid; grid-template-columns: 340px 1fr; gap: 20px; }
  .card { background: #fff; border-radius: 10px; box-shadow: 0 1px 6px rgba(27,58,107,0.08); padding: 20px; }
  .card h2 { font-size: 0.95rem; font-weight: 700; color: #1b3a6b; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 16px; border-bottom: 2px solid #e4eaf4; padding-bottom: 8px; }
  .left-col { display: flex; flex-direction: column; gap: 20px; }
  .right-col { display: flex; flex-direction: column; gap: 20px; }

  label { font-size: 0.8rem; font-weight: 600; color: #4a5a7a; display: block; margin-bottom: 4px; margin-top: 10px; }
  label:first-of-type { margin-top: 0; }
  input, select { width: 100%; padding: 8px 10px; border: 1px solid #c8d4e8; border-radius: 6px; font-size: 0.88rem; color: #1a2340; background: #f7f9fc; outline: none; transition: border 0.2s; }
  input:focus, select:focus { border-color: #1b3a6b; background: #fff; }
  input:disabled, select:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn { display: inline-block; padding: 9px 18px; border: none; border-radius: 6px; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .btn-primary { background: #1b3a6b; color: #fff; width: 100%; margin-top: 12px; }
  .btn-primary:hover { background: #15306090; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-sm { padding: 4px 10px; font-size: 0.75rem; border-radius: 4px; }
  .btn-danger { background: #e8ecf5; color: #c0392b; }
  .btn-danger:hover { background: #fde8e8; }

  .readonly-note { font-size: 0.75rem; color: #e67e22; font-weight: 600; margin-top: 8px; display: none; }

  .summary-bar { margin-bottom: 4px; }
  .summary-labels { display: flex; justify-content: space-between; font-size: 0.8rem; color: #4a5a7a; margin-bottom: 6px; }
  .summary-labels strong { color: #1a2340; }
  .progress-track { background: #e4eaf4; border-radius: 20px; height: 14px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 20px; transition: width 0.4s, background 0.4s; }

  .warning-box { border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; font-weight: 600; display: none; margin-top: 10px; }
  .warning-box.show { display: block; }
  .warning-box.warn { background: #fff7e0; color: #b8860b; border-left: 4px solid #f0c040; }
  .warning-box.danger { background: #fde8e8; color: #c0392b; border-left: 4px solid #e74c3c; }

  .cat-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .cat-row label { margin: 0; flex: 1; font-size: 0.8rem; color: #1a2340; font-weight: 600; }
  .cat-row input { width: 100px; flex-shrink: 0; }
  .cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  canvas { display: block; margin: 0 auto; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.78rem; color: #4a5a7a; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  .cat-summary-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .cat-summary-row .cat-label { flex: 1; font-size: 0.82rem; font-weight: 600; color: #1a2340; }
  .cat-summary-row .cat-amounts { font-size: 0.78rem; color: #4a5a7a; white-space: nowrap; }
  .cat-progress-track { flex: 2; background: #e4eaf4; border-radius: 10px; height: 8px; overflow: hidden; }
  .cat-progress-fill { height: 100%; border-radius: 10px; transition: width 0.4s; }
  .over-tag { font-size: 0.7rem; background: #fde8e8; color: #c0392b; border-radius: 4px; padding: 1px 5px; font-weight: 700; }

  .expense-list { max-height: 260px; overflow-y: auto; }
  .expense-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #f0f2f8; font-size: 0.82rem; }
  .expense-item:last-child { border-bottom: none; }
  .exp-cat-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .exp-info { flex: 1; }
  .exp-info .exp-name { font-weight: 600; color: #1a2340; }
  .exp-info .exp-meta { color: #8a9ab8; font-size: 0.74rem; }
  .exp-amount { font-weight: 700; color: #1b3a6b; }
  .no-expenses { color: #8a9ab8; font-size: 0.85rem; text-align: center; padding: 20px 0; }

  .export-row { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }

  @media (max-width: 750px) {
    .main { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<header>
  <h1>📊 Monthly Budget Tracker</h1>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&#8592;</button>
    <span id="monthLabel"></span>
    <button onclick="changeMonth(1)" id="nextBtn">&#8594;</button>
  </div>
</header>

<div class="main">
  <div class="left-col">
    <div class="card">
      <h2>Budget Setup</h2>
      <div class="readonly-note" id="readonlyNote">⚠ Viewing past month — budget is read-only</div>
      <label>Total Monthly Budget (€)</label>
      <input type="number" id="totalBudget" min="0" placeholder="e.g. 2000">
      <div id="catBudgets"></div>
      <button class="btn btn-primary" id="saveBudgetBtn" onclick="saveBudgets()">Save Budgets</button>
    </div>

    <div class="card">
      <h2>Add Expense</h2>
      <div class="readonly-note" id="readonlyNote2">⚠ Viewing past month — switch to current month to add expenses</div>
      <label>Date</label>
      <input type="date" id="expDate">
      <label>Category</label>
      <select id="expCat"></select>
      <label>Amount (€)</label>
      <input type="number" id="expAmount" min="0" placeholder="0.00">
      <label>Note (optional)</label>
      <input type="text" id="expNote" placeholder="e.g. Grocery run">
      <button class="btn btn-primary" id="addExpBtn" onclick="addExpense()">+ Add Expense</button>
    </div>
  </div>

  <div class="right-col">
    <div class="card">
      <h2>Monthly Summary</h2>
      <div class="summary-bar">
        <div class="summary-labels">
          <span>Spent: <strong id="totalSpent">€0.00</strong></span>
          <span>Budget: <strong id="totalBudgetDisplay">€0.00</strong></span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="mainProgress" style="width:0%;background:#2e7d32;"></div>
        </div>
      </div>
      <div class="warning-box" id="mainWarning"></div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
      <div class="card">
        <h2>Breakdown</h2>
        <canvas id="pieChart" width="200" height="200"></canvas>
        <div class="legend" id="legend"></div>
      </div>
      <div class="card">
        <h2>By Category</h2>
        <div id="catSummary"></div>
      </div>
    </div>

    <div class="card">
      <h2>Expense Log</h2>
      <div class="expense-list" id="expenseList"></div>
      <div class="export-row">
        <button class="btn btn-primary" style="width:auto;padding:9px 22px;" onclick="exportPDF()">⬇ Export to PDF</button>
      </div>
    </div>
  </div>
</div>

<script>
const CATEGORIES = [
  { name: 'Housing',       color: '#1b3a6b' },
  { name: 'Food',          color: '#2980b9' },
  { name: 'Transport',     color: '#16a085' },
  { name: 'Health',        color: '#8e44ad' },
  { name: 'Entertainment', color: '#e67e22' },
  { name: 'Clothing',      color: '#c0392b' },
  { name: 'Savings',       color: '#27ae60' },
  { name: 'Other',         color: '#7f8c8d' },
];

// viewMonth: "YYYY-MM" string
const now = new Date();
let viewYear = now.getFullYear();
let viewMonth = now.getMonth(); // 0-indexed

function viewKey() {
  return `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}`;
}

function isCurrentMonth() {
  return viewYear === now.getFullYear() && viewMonth === now.getMonth();
}

// ── Persistence ──────────────────────────────────────────────────────────────
function getState() {
  try {
    const raw = localStorage.getItem('bgt_state');
    return raw ? JSON.parse(raw) : {};
  } catch { return {}; }
}

function saveFullState(s) {
  try { localStorage.setItem('bgt_state', JSON.stringify(s)); } catch(e) {}
}

function getMonthData(ym) {
  const s = getState();
  if (!s[ym]) s[ym] = { totalBudget: 0, catBudgets: {}, expenses: [] };
  CATEGORIES.forEach(c => { if (!s[ym].catBudgets[c.name]) s[ym].catBudgets[c.name] = 0; });
  return s[ym];
}

function saveMonthData(ym, data) {
  const s = getState();
  s[ym] = data;
  saveFullState(s);
}

// ── Navigation ────────────────────────────────────────────────────────────────
function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  init(false);
}

// ── Init ──────────────────────────────────────────────────────────────────────
function init(setDate = true) {
  updateMonthLabel();
  renderCatBudgetInputs();
  renderCatSelect();
  if (setDate) setTodayDate();
  updateReadonlyState();
  render();
}

function updateMonthLabel() {
  const d = new Date(viewYear, viewMonth, 1);
  const label = d.toLocaleString('default', { month: 'long', year: 'numeric' });
  document.getElementById('monthLabel').textContent = label;
  document.getElementById('nextBtn').disabled = isCurrentMonth();
}

function setTodayDate() {
  document.getElementById('expDate').value = now.toISOString().split('T')[0];
}

function updateReadonlyState() {
  const past = !isCurrentMonth();
  ['readonlyNote','readonlyNote2'].forEach(id => {
    document.getElementById(id).style.display = past ? 'block' : 'none';
  });
  document.getElementById('saveBudgetBtn').disabled = past;
  document.getElementById('addExpBtn').disabled = past;
  document.getElementById('totalBudget').disabled = past;
  document.getElementById('expDate').disabled = past;
  document.getElementById('expCat').disabled = past;
  document.getElementById('expAmount').disabled = past;
  document.getElementById('expNote').disabled = past;
  document.querySelectorAll('.cat-budget-input').forEach(el => el.disabled = past);
}

function renderCatBudgetInputs() {
  const data = getMonthData(viewKey());
  const el = document.getElementById('catBudgets');
  el.innerHTML = '<label style="margin-top:12px;">Per-Category Limits (€)</label>';
  CATEGORIES.forEach(c => {
    el.innerHTML += `
      <div class="cat-row">
        <div class="cat-dot" style="background:${c.color}"></div>
        <label>${c.name}</label>
        <input type="number" min="0" class="cat-budget-input" id="cb_${c.name}"
          value="${data.catBudgets[c.name] || ''}" placeholder="0">
      </div>`;
  });
  document.getElementById('totalBudget').value = data.totalBudget || '';
}

function renderCatSelect() {
  const sel = document.getElementById('expCat');
  sel.innerHTML = CATEGORIES.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
}

// ── Actions ───────────────────────────────────────────────────────────────────
function saveBudgets() {
  if (!isCurrentMonth()) return;
  const ym = viewKey();
  const data = getMonthData(ym);
  data.totalBudget = parseFloat(document.getElementById('totalBudget').value) || 0;
  CATEGORIES.forEach(c => {
    data.catBudgets[c.name] = parseFloat(document.getElementById('cb_' + c.name).value) || 0;
  });
  saveMonthData(ym, data);
  render();
}

function addExpense() {
  if (!isCurrentMonth()) return;
  const date = document.getElementById('expDate').value;
  const cat  = document.getElementById('expCat').value;
  const amt  = parseFloat(document.getElementById('expAmount').value);
  const note = document.getElementById('expNote').value.trim();
  if (!date || !cat || isNaN(amt) || amt <= 0) { alert('Please fill in date, category, and a valid amount.'); return; }
  const ym = viewKey();
  const data = getMonthData(ym);
  data.expenses.unshift({ id: Date.now(), date, cat, amount: amt, note });
  saveMonthData(ym, data);
  document.getElementById('expAmount').value = '';
  document.getElementById('expNote').value = '';
  render();
}

function deleteExpense(id) {
  const ym = viewKey();
  const data = getMonthData(ym);
  data.expenses = data.expenses.filter(e => e.id !== id);
  saveMonthData(ym, data);
  render();
}

// ── Totals ────────────────────────────────────────────────────────────────────
function getTotals() {
  const data = getMonthData(viewKey());
  const byCat = {};
  CATEGORIES.forEach(c => byCat[c.name] = 0);
  data.expenses.forEach(e => { byCat[e.cat] = (byCat[e.cat] || 0) + e.amount; });
  const total = Object.values(byCat).reduce((a, b) => a + b, 0);
  return { total, byCat, monthly: data.expenses, budget: data.totalBudget, catBudgets: data.catBudgets };
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const { total, byCat, monthly, budget, catBudgets } = getTotals();
  renderSummary(total, budget);
  renderPie(byCat);
  renderCatSummary(byCat, catBudgets);
  renderExpenseList(monthly);
}

function renderSummary(total, budget) {
  document.getElementById('totalSpent').textContent = `€${total.toFixed(2)}`;
  document.getElementById('totalBudgetDisplay').textContent = `€${budget.toFixed(2)}`;
  const pct = budget > 0 ? Math.min((total / budget) * 100, 100) : 0;
  const fill = document.getElementById('mainProgress');
  fill.style.width = pct + '%';
  const warn = document.getElementById('mainWarning');
  if (budget > 0 && total > budget) {
    fill.style.background = '#c0392b';
    warn.className = 'warning-box show danger';
    warn.textContent = `⚠️ Over budget by €${(total - budget).toFixed(2)}! Review your spending.`;
  } else if (budget > 0 && total >= budget * 0.85) {
    fill.style.background = '#e67e22';
    warn.className = 'warning-box show warn';
    warn.textContent = `⚡ Heads up! You've used ${Math.round((total/budget)*100)}% of your monthly budget.`;
  } else {
    fill.style.background = '#1b7a3a';
    warn.className = 'warning-box';
  }
}

function renderPie(byCat) {
  const canvas = document.getElementById('pieChart');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const total = Object.values(byCat).reduce((a, b) => a + b, 0);
  const legend = document.getElementById('legend');
  if (total === 0) {
    ctx.fillStyle = '#e4eaf4'; ctx.beginPath(); ctx.arc(W/2,H/2,H/2-10,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#8a9ab8'; ctx.font = '12px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText('No data', W/2, H/2+5); legend.innerHTML = ''; return;
  }
  let start = -Math.PI / 2;
  const cx = W/2, cy = H/2, r = H/2-10;
  const items = CATEGORIES.filter(c => byCat[c.name] > 0);
  items.forEach(c => {
    const slice = (byCat[c.name] / total) * Math.PI * 2;
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,start+slice); ctx.closePath();
    ctx.fillStyle = c.color; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();
    start += slice;
  });
  ctx.beginPath(); ctx.arc(cx,cy,r*0.5,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  ctx.fillStyle='#1a2340'; ctx.font='bold 13px Segoe UI'; ctx.textAlign='center';
  ctx.fillText(`€${total.toFixed(0)}`,cx,cy-4);
  ctx.fillStyle='#8a9ab8'; ctx.font='10px Segoe UI'; ctx.fillText('total',cx,cy+12);
  legend.innerHTML = items.map(c =>
    `<div class="legend-item"><div class="legend-dot" style="background:${c.color}"></div>${c.name}</div>`
  ).join('');
}

function renderCatSummary(byCat, catBudgets) {
  const el = document.getElementById('catSummary');
  el.innerHTML = '';
  CATEGORIES.forEach(c => {
    const spent = byCat[c.name] || 0;
    const limit = catBudgets[c.name] || 0;
    if (spent === 0 && limit === 0) return;
    const pct = limit > 0 ? Math.min((spent/limit)*100, 100) : 0;
    const barColor = limit>0&&spent>limit ? '#c0392b' : limit>0&&spent>=limit*0.85 ? '#e67e22' : c.color;
    const overTag = limit>0&&spent>limit ? `<span class="over-tag">OVER</span>` : '';
    el.innerHTML += `
      <div class="cat-summary-row">
        <div class="cat-label" style="color:${c.color}">${c.name} ${overTag}</div>
        <div class="cat-progress-track">
          <div class="cat-progress-fill" style="width:${limit>0?pct:0}%;background:${barColor}"></div>
        </div>
        <div class="cat-amounts">€${spent.toFixed(0)}${limit>0?'/€'+limit.toFixed(0):''}</div>
      </div>`;
  });
  if (!el.innerHTML) el.innerHTML = '<div class="no-expenses">Set category limits above.</div>';
}

function renderExpenseList(monthly) {
  const el = document.getElementById('expenseList');
  const past = !isCurrentMonth();
  if (!monthly.length) { el.innerHTML = '<div class="no-expenses">No expenses logged this month.</div>'; return; }
  el.innerHTML = monthly.map(e => {
    const cat = CATEGORIES.find(c => c.name === e.cat) || { color: '#999' };
    const delBtn = past ? '' : `<button class="btn btn-sm btn-danger" onclick="deleteExpense(${e.id})">✕</button>`;
    return `<div class="expense-item">
      <div class="exp-cat-dot" style="background:${cat.color}"></div>
      <div class="exp-info">
        <div class="exp-name">${e.cat}${e.note?' — '+e.note:''}</div>
        <div class="exp-meta">${e.date}</div>
      </div>
      <div class="exp-amount">€${e.amount.toFixed(2)}</div>
      ${delBtn}
    </div>`;
  }).join('');
}

// ── PDF Export ────────────────────────────────────────────────────────────────
function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const { total, byCat, monthly, budget, catBudgets } = getTotals();
  const d = new Date(viewYear, viewMonth, 1);
  const monthName = d.toLocaleString('default', { month: 'long', year: 'numeric' });

  const blue=[27,58,107], gray=[74,90,122], light=[228,234,244], black=[26,35,64];

  doc.setFillColor(...blue); doc.rect(0,0,210,22,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(14); doc.setFont('helvetica','bold');
  doc.text('Monthly Budget Tracker',14,10);
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text(monthName,14,17);
  doc.text(`Generated: ${new Date().toLocaleDateString()}`,196,17,{align:'right'});

  let y=30;
  doc.setTextColor(...black); doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text('Summary',14,y); y+=6;
  doc.setFillColor(...light); doc.roundedRect(14,y,182,18,3,3,'F');
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(...gray);
  doc.text('Total Spent',20,y+6); doc.text('Monthly Budget',80,y+6); doc.text('Remaining',140,y+6);
  doc.setFontSize(11); doc.setFont('helvetica','bold'); doc.setTextColor(...black);
  doc.text(`€${total.toFixed(2)}`,20,y+13); doc.text(`€${budget.toFixed(2)}`,80,y+13);
  const rem=budget-total;
  doc.setTextColor(rem<0?192:27,rem<0?57:58,rem<0?43:107);
  doc.text(`€${rem.toFixed(2)}`,140,y+13); y+=26;

  doc.setFillColor(...light); doc.roundedRect(14,y,182,5,2,2,'F');
  const pct=budget>0?Math.min(total/budget,1):0;
  const barC=total>budget?[192,57,43]:total>=budget*0.85?[230,126,34]:[27,122,58];
  doc.setFillColor(...barC); doc.roundedRect(14,y,182*pct,5,2,2,'F'); y+=12;

  doc.setTextColor(...black); doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text('Category Breakdown',14,y); y+=6;
  CATEGORIES.filter(c=>byCat[c.name]>0||catBudgets[c.name]>0).forEach(c => {
    const spent=byCat[c.name]||0, limit=catBudgets[c.name]||0;
    const r=parseInt(c.color.slice(1,3),16),g=parseInt(c.color.slice(3,5),16),b=parseInt(c.color.slice(5,7),16);
    doc.setFillColor(r,g,b); doc.circle(17,y+2,2,'F');
    doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(...black);
    doc.text(c.name,22,y+3.5);
    doc.setFont('helvetica','normal'); doc.setTextColor(...gray);
    doc.text(`€${spent.toFixed(2)}${limit>0?' / €'+limit.toFixed(2):''}`,100,y+3.5);
    if(limit>0&&spent>limit){doc.setTextColor(192,57,43);doc.setFont('helvetica','bold');doc.text('OVER BUDGET',160,y+3.5);}
    doc.setFillColor(...light); doc.roundedRect(22,y+5,80,2.5,1,1,'F');
    if(limit>0){const p=Math.min(spent/limit,1),bc=spent>limit?[192,57,43]:spent>=limit*0.85?[230,126,34]:[r,g,b];doc.setFillColor(...bc);doc.roundedRect(22,y+5,80*p,2.5,1,1,'F');}
    y+=12; if(y>260){doc.addPage();y=20;}
  });

  y+=4;
  doc.setTextColor(...black); doc.setFontSize(11); doc.setFont('helvetica','bold');
  doc.text('Expense Log',14,y); y+=6;
  doc.setFillColor(...blue); doc.rect(14,y,182,7,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont('helvetica','bold');
  doc.text('Date',17,y+5); doc.text('Category',50,y+5); doc.text('Note',95,y+5); doc.text('Amount',175,y+5,{align:'right'});
  y+=10;
  if(!monthly.length){
    doc.setTextColor(...gray); doc.setFont('helvetica','italic'); doc.setFontSize(9);
    doc.text('No expenses logged this month.',14,y);
  } else {
    monthly.forEach((e,i)=>{
      if(y>270){doc.addPage();y=20;}
      if(i%2===0){doc.setFillColor(247,249,252);doc.rect(14,y-4,182,7,'F');}
      doc.setTextColor(...black); doc.setFont('helvetica','normal'); doc.setFontSize(8);
      doc.text(e.date,17,y); doc.text(e.cat,50,y);
      doc.text(e.note?e.note.substring(0,35):'—',95,y);
      doc.setFont('helvetica','bold'); doc.text(`€${e.amount.toFixed(2)}`,175,y,{align:'right'});
      y+=7;
    });
    doc.setFillColor(...light); doc.rect(14,y-2,182,8,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...blue);
    doc.text('Total',17,y+4); doc.text(`€${total.toFixed(2)}`,175,y+4,{align:'right'});
  }
  doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(...gray);
  doc.text('Generated by Monthly Budget Tracker',105,290,{align:'center'});
  doc.save(`budget-${viewKey()}.pdf`);
}

// Register SW
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{   navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
}

init();
</script>
</body>
</html>
